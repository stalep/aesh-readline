name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean compile test

  windows-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - uses: ilammy/msvc-dev-cmd@v1
    - name: Install dependencies
      shell: bash
      run: mvn clean install -pl terminal-api -am -DskipTests -Dformat.skip=true
    - name: Build and test terminal-tty
      shell: bash
      run: mvn clean test -pl terminal-tty -Dformat.skip=true
